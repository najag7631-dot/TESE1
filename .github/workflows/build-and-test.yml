name: Build and Test

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check code style with ESLint
        run: npm run lint
        continue-on-error: true

      - name: Build application
        run: npm run build

      - name: Check exports
        run: npx tsc --noEmit

  test:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests (if available)
        run: npm test 2>/dev/null || echo "No tests configured"
        continue-on-error: true

      - name: Build for production
        run: npm run build

      - name: Create deployment artifacts
        run: |
          mkdir -p deployment
          cp -r .next deployment/
          cp -r public deployment/ 2>/dev/null || true
          cp package.json deployment/
          cp package-lock.json deployment/ 2>/dev/null || true

      - name: Upload artifacts for deployment
        uses: actions/upload-artifact@v4
        with:
          name: production-build
          path: deployment/
          retention-days: 30

  notify:
    runs-on: ubuntu-latest
    needs: [build, test]
    if: always()
    
    steps:
      - name: Comment build status
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const buildStatus = '${{ needs.build.result }}' === 'success' ? '✅ Passed' : '❌ Failed';
            const testStatus = '${{ needs.test.result }}' === 'success' ? '✅ Passed' : '⚠️ Not required';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Build Status\n\n- Build: ${buildStatus}\n- Test: ${testStatus}\n\nThe Next.js application has been built successfully!`
            })
        continue-on-error: true
